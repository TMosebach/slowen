<h3>Bestandskonten</h3>

<table class="table table-striped table-sm">
    <thead>
      <tr class="d-flex">
        <th scope="col" class="col-3">Name</th>
        <th scope="col" class="col-1">Art</th>
        <th scope="col" class="col-1 text-right">Saldo</th>
        <th scope="col" class="col-7"></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let konto of konten | async" class="d-flex">
        <td class="col-3">
          <a *ngIf="isKonto(konto)" routerLink="/buchhaltung/umsatz/{{konto.id}}">{{konto.name}}</a>
          <a *ngIf="isDepot(konto)"routerLink="/buchhaltung/bestand/{{konto.id}}">{{konto.name}}</a>
        </td>
        <td class="col-1">{{konto.art}}</td>
        <td class="col-1 text-right">{{konto.saldo | number:'1.2-2'}}</td>
        <td class="col-7">
            <button class="btn btn-primary btn-sm" (click)="onBuchen(konto)">Buchen</button>
        </td>
      </tr>
    </tbody>
</table>
