<h3>Kontoliste</h3>

<table class="table table-striped">
    <thead>
      <tr>
        <th scope="col">Name</th>
        <th scope="col">Art</th>
        <th scope="col">Saldo</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let konto of konten | async">
        <td>
          <a *ngIf="konto.type ==='Konto'" routerLink="/buchhaltung/konten/{{konto.id}}">{{konto.name}}</a>
          <a *ngIf="konto.type ==='Depot'" routerLink="/buchhaltung/depots/{{konto.id}}">{{konto.name}}</a>
        </td>
        <td>{{konto.art}}</td>
        <td>{{konto.saldo}}</td>
      </tr>
    </tbody>
  </table>
