<h3>Kontoumsatz</h3>

<app-umsatz-tabelle 
    [buchungsSeite]="buchungsSeite"
    [kontoId]="kontoId" 
    (loadNewPage)="load($event)"></app-umsatz-tabelle>

<app-buchung-formular 
    [kontoId]="kontoId" 
    (abbrechen)="onAbbrechen()" 
    (buchen)="onBuchen($event)"></app-buchung-formular>

<a class="btn btn-light mt-3" routerLink="/buchhaltung">Zurück</a>
