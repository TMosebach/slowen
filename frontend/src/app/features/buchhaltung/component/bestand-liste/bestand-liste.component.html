<h3>Bestände</h3>

<table class="table table-striped table-sm mt-3">
    <thead>
        <tr>
            <th>Asset</th>
            <th>Menge</th>
            <th>Kaufwert</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let bestand of bestaende">
            <td>{{ bestand.asset.name }}</td>
            <td>{{ bestand.menge.menge }}</td>
            <td><app-betrag-label [betrag]="bestand.einstandsWert"></app-betrag-label></td>
            <td><button class="btn btn-sm btn-primary" [routerLink]="['verkauf', bestand.asset.id]">Verkauf</button></td>
        </tr>
    </tbody>
</table>
