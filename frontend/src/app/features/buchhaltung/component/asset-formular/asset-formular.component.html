<form [formGroup]="assetForm" class="mb-4" (submit)="speichern()">
    <div class="row mb-3">
        <label for="name" class="col-sm-2 col-form-label">Name</label>
        <div class="col-sm-5">
            <input formControlName="name" type="text" class="form-control" id="name">
        </div>
    </div>
    <div class="row mb-3">
        <label for="betrag" class="col-sm-2 col-form-label"></label>
        <div class="col-sm-10">
            <button type="submit" class="btn btn-primary" [disabled]="assetForm.invalid">Speichern</button>
        </div>
    </div>
</form>
