<table class="table table-striped">
    <thead>
      <tr>
        <th scope="col">Name</th>
        <th scope="col">Art</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let konto of konten | async">
        <td>{{konto.name}}</td>
        <td>{{konto.art}}</td>
      </tr>
    </tbody>
    <tfoot>
        <button class="btn btn-primary" (click)="onNew()">+</button>
    </tfoot>
</table>
