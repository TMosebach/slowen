<form [formGroup]="assetForm">
    <div class="form-group">
        <label for="name">Name</label>
        <input 
            type="text" 
            class="form-control" 
            formControlName="name" 
            id="name" 
            placeholder="Name"
            autofocus>
    </div>
    <div class="form-group">
        <label for="isin">ISIN</label>
        <input 
            type="text" 
            class="form-control" 
            formControlName="isin" 
            id="isin" 
            placeholder="ISIN">
    </div>
    <div class="form-group">
        <label for="wkn">WKN</label>
        <input 
            type="text" 
            class="form-control" 
            formControlName="wkn" 
            id="wkn" 
            placeholder="WKN">
    </div>
</form>
<button class="btn btn-primary" (click)="onSpeichern()" [disabled]="!assetForm.valid">Speichern</button>
<button class="btn btn-light" (click)="onAbbrechen()">Abbrechen</button>
